<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShopHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo">Shop<span>Hub</span></a>
    <nav class="nav-links">
      <a href="index.html">Shop</a>
      <a href="register.html">Register</a>
    </nav>
  </header>

  <main class="container">
    <div class="form-card">
      <h1 class="page-title">Login</h1>
      <p class="page-subtitle">Sign in to checkout and track orders.</p>
      <div id="alert" class="alert hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
      <p class="form-footer">No account? <a href="register.html">Register</a></p>
      <p class="form-footer" style="margin-top:0.5rem;font-size:0.8rem;">Demo admin: admin@store.com / admin123</p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
