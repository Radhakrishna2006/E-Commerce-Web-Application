<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ShopHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo">Shop<span>Hub</span></a>
    <nav class="nav-links">
      <a href="index.html">Shop</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <div class="form-card">
      <h1 class="page-title">Create account</h1>
      <p class="page-subtitle">Register as a customer to place orders.</p>
      <div id="alert" class="alert hidden"></div>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>
      <p class="form-footer">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
