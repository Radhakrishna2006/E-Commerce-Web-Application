<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ShopHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo">Shop<span>Hub</span></a>
    <nav class="nav-links">
      <a href="index.html">Shop</a>
      <a href="admin.html" class="active">Admin</a>
      <span id="nav-user" class="user-info hidden"></span>
      <button type="button" id="nav-logout" class="btn btn-secondary btn-sm hidden">Logout</button>
    </nav>
  </header>

  <main class="container">
    <h1 class="page-title">Admin Dashboard</h1>
    <p class="page-subtitle">Manage products and track all customer orders.</p>
    <div id="alert" class="alert hidden"></div>

    <div class="admin-tabs">
      <button type="button" class="tab-btn active" data-tab="products">Products</button>
      <button type="button" class="tab-btn" data-tab="orders">All Orders</button>
    </div>

    <section id="tab-products" class="tab-panel active">
      <button type="button" id="add-product" class="btn btn-primary" style="margin-bottom:1.5rem;">+ Add product</button>
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-table"></tbody>
      </table>
    </section>

    <section id="tab-orders" class="tab-panel">
      <div id="admin-orders"></div>
    </section>
  </main>

  <div id="product-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">Add product</h2>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="form-group">
          <label for="p-name">Name</label>
          <input type="text" id="p-name" required>
        </div>
        <div class="form-group">
          <label for="p-description">Description</label>
          <textarea id="p-description" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label for="p-price">Price ($)</label>
          <input type="number" id="p-price" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label for="p-stock">Stock</label>
          <input type="number" id="p-stock" min="0" required>
        </div>
        <div class="form-group">
          <label for="p-category">Category</label>
          <input type="text" id="p-category" required>
        </div>
        <div class="form-group">
          <label for="p-image">Image URL</label>
          <input type="url" id="p-image">
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
